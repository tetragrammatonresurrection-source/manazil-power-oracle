<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manazil al-Qamar | Power Oracle</title>
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --card: rgba(10, 15, 25, 0.85); --good: #2ea043; --bad: #da3633; --neutral: #8b949e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e6ed; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0f1a 0%, #05070a 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--t) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        .app-container { max-width: 500px; width: 100%; background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 35px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 1; }
        .lang-switch { text-align: right; }
        .lang-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; }
        header { text-align: center; }
        h1 { font-weight: 300; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin: 0; font-size: 1.5rem; }
        .sub-header { font-size: 0.75rem; color: var(--gold); opacity: 0.8; margin-bottom: 10px; }
        #selected-date { font-weight: bold; color: var(--gold); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; }
        .wheel-container { position: relative; width: 240px; height: 240px; margin: 0 auto 15px; border-radius: 50%; transition: box-shadow 0.6s ease; }
        .glow-good { box-shadow: 0 0 35px var(--good); } .glow-bad { box-shadow: 0 0 35px var(--bad); } .glow-neutral { box-shadow: 0 0 35px var(--gold); }
        svg.wheel-svg { width: 100%; height: 100%; overflow: visible; }
        #moonPointer { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .zodiac-label { fill: #fff; font-size: 9px; font-weight: bold; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input { flex: 2; background: transparent; border: none; color: white; outline: none; color-scheme: dark; }
        .update-btn { background: var(--gold); border: none; padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        .info-panel { text-align: center; padding: 15px; border-radius: 25px; background: rgba(0,0,0,0.5); border: 1px solid rgba(212, 175, 55, 0.15); margin-bottom: 15px; }
        #mSigil { font-size: 3.5rem; color: var(--gold); line-height: 1; filter: drop-shadow(0 0 8px var(--gold)); }
        #pill { display:inline-block; padding:3px 10px; border-radius:10px; font-size:0.65rem; font-weight:bold; color:#fff; margin:5px 0; }
        .num-circle { width: 42px; height: 42px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: var(--gold); margin: 0 auto 5px; }
        .cal { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cal-item { min-width: 100px; padding: 10px; border-radius: 15px; text-align: center; flex-shrink: 0; cursor: pointer; color: white; border: 2px solid transparent; }
        .big-btn { width: 100%; padding: 14px; border-radius: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 8px; border: none; }
        .btn-gold { background: var(--gold); color: #000; }
        .help-box { display: none; text-align: left; font-size: 0.82rem; background: #000; padding: 20px; border-radius: 20px; border: 1px solid var(--gold); color: #fff; max-height: 400px; overflow-y: auto; margin-bottom: 10px; }
        .locked-field { filter: blur(4px); opacity: 0.6; cursor: pointer; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .premium-card { background: rgba(10, 15, 25, 0.98); border: 1px solid var(--gold); padding: 30px; border-radius: 35px; text-align: center; max-width: 380px; width: 92%; color: white; box-shadow: 0 0 50px #000; }
        .qr-wrapper { background: white; padding: 10px; border-radius: 20px; display: inline-block; margin: 15px 0; }
        .paypal-btn { background: #0070ba; color: white !important; text-decoration: none; padding: 14px; border-radius: 15px; width: 100%; display: block; font-weight: bold; box-sizing: border-box; margin-top: 10px; }
        .secondary-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
<div id="stars"></div>
<div class="app-container">
    <div class="lang-switch"><button onclick="toggleLang()" id="langBtn" class="lang-btn">ENG</button></div>
    <header><h1>Manazil al-Qamar</h1><div class="sub-header" id="subH">Arabski lunini dvorci</div><div id="selected-date" style="text-align:center">---</div></header>
    <div class="input-group"><input type="datetime-local" id="dateInput"><button class="update-btn" onclick="hdlInp()">OSVEŽI</button></div>
    <div class="input-group"><input type="date" id="birthInput" onchange="saveBirth()" placeholder="Rojstni datum"></div>
    <div id="wheelBox" class="wheel-container"><svg id="mainWheel" class="wheel-svg" viewBox="0 0 300 300"></svg></div>
    <div class="info-panel" id="infoPanel">
        <div id="mPhase">---</div><div id="mSigil"></div><div id="pill">---</div>
        <div id="mName" style="font-size:1.4rem; font-weight:bold">---</div><div id="mDivine">---</div>
        <div style="display:flex; justify-content:space-around; margin:15px 0;">
            <div><div class="num-circle" id="dayNum">-</div><div id="lblD" style="font-size:0.6rem">DAN</div></div>
            <div id="pSec" style="display:none;"><div class="num-circle" id="persNum">-</div><div id="lblP" style="font-size:0.6rem">TI</div></div>
            <div id="tSec" style="display:none;"><div class="num-circle" id="totalNum">-</div><div id="lblT" style="font-size:0.6rem">SKUPAJ</div></div>
        </div>
        <div id="mDesc">---</div><div id="zodAdvice">---</div>
        <div id="extra" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:0.8rem; color:var(--gold); font-weight:bold">
            <div id="eB">🧬 TELO: -</div><div id="eR">🪐 VLADAR: -</div>
            <div id="eA" onclick="checkPremium()">😇 ANGEL: -</div><div id="eE" onclick="checkPremium()">✨ ELEM: -</div>
        </div>
    </div>
    <div class="cal" id="calendar"></div>
    <button class="big-btn btn-gold" onclick="checkPremium()">AKTIVIRAJ PREMIUM</button>
    <button class="big-btn" style="background:none; border:1px solid var(--gold); color:var(--gold)" id="hBtn" onclick="tglH()">POMOČ</button>
    <div id="helpBox" class="help-box"></div>
</div>

<div id="premiumModal" class="modal-overlay" onclick="if(event.target==this)this.style.display='none'">
    <div class="premium-card">
        <div id="donationView">
            <h2 style="color:var(--gold); font-weight:300">PREMIUM ODKLEP</h2>
            <p style="font-size:0.85rem">Za aktivacijo vpišite ime (npr. MATEJ):</p>
            <input type="text" id="userNameInput" placeholder="IME" style="width:100%; padding:14px; border-radius:15px; border:1px solid var(--gold); background:rgba(255,255,255,0.05); color:white; text-align:center; font-size:1.1rem" onkeyup="this.value=this.value.toUpperCase()">
            <div class="qr-wrapper"><img src="https://qrserver.com" width="150" height="150"></div>
            <p style="font-size:0.75rem; opacity:0.8">Donirajte 5€+ in v sporočilo pripišite IME.</p>
            <a href="https://paypal.me" target="_blank" class="paypal-btn">DONIRAJ PREK PAYPAL</a>
            <button class="secondary-btn" onclick="showActivationInput()">VNESI KLJUČ</button>
        </div>
        <div id="activationView" style="display:none">
            <h2 style="color:var(--gold); font-weight:300">AKTIVACIJA</h2>
            <input type="text" id="premiumKeyInput" class="key-input-field" placeholder="KLJUČ">
            <button class="big-btn btn-gold" onclick="processActivation()">AKTIVIRAJ</button>
            <button class="secondary-btn" onclick="showDonationView()">NAZAJ</button>
        </div>
    </div>
</div>

<script>
let lang = 'sl', aCtx = null, isPremium = localStorage.getItem('manazil_premium') === 'true';
const mansions = [
    {sig:"𐩿", n:"Al-Sharatain", div:"The Initiating", ang:"Geniel", el:"Fire", ty:"good", d:{sl:"Novi začetki.", en:"New starts."}},
    {sig:"𐩮", n:"Al-Butain", div:"The Most Generous", ang:"Enediel", el:"Earth", ty:"neutral", d:{sl:"Skrito bogastvo.", en:"Hidden things."}},
    {sig:"𐩤", n:"Al-Thurayya", div:"The Wise One", ang:"Amixiel", el:"Fire", ty:"good", d:{sl:"Sreča v poslu.", en:"Luck."}},
    {sig:"𐩣", n:"Al-Debaran", div:"The Sustainer", ang:"Azariel", el:"Earth", ty:"bad", d:{sl:"Pazi na prepire.", en:"Quarrels."}},
    {sig:"𐩠", n:"Al-Haqa", div:"The Evolver", ang:"Gabriel", el:"Air", ty:"good", d:{sl:"Učenje.", en:"Wisdom."}},
    {sig:"𐩥", n:"Al-Hana", div:"The Guardian", ang:"Dirachiel", el:"Air", ty:"good", d:{sl:"Mir.", en:"Peace."}},
    {sig:"𐩷", n:"Al-Dhira", div:"The Reckoner", ang:"Seheliel", el:"Water", ty:"good", d:{sl:"Zaščita.", en:"Protection."}},
    {sig:"𐩺", n:"Al-Nathra", div:"The Subtle", ang:"Amnediel", el:"Water", ty:"good", d:{sl:"Intuicija.", en:"Intuition."}},
    {sig:"𐩰", n:"Al-Tarf", div:"The Mighty", ang:"Barbiel", el:"Fire", ty:"bad", d:{sl:"Prevare.", en:"Lies."}},
    {sig:"𐩯", n:"Al-Jabhah", div:"The All-Hearing", ang:"Ardifiel", el:"Fire", ty:"good", d:{sl:"Ugled.", en:"Honor."}},
    {sig:"𐩱", n:"Al-Zubrah", div:"The All-Aware", ang:"Zariel", el:"Fire", ty:"good", d:{sl:"Dobiček.", en:"Profit."}},
    {sig:"𐩨", n:"Al-Sarfah", div:"The Forbearing", ang:"Alariel", el:"Earth", ty:"bad", d:{sl:"Samota.", en:"Solitude."}},
    {sig:"𐩴", n:"Al-Awwa", div:"The Sublime", ang:"Hagiel", el:"Earth", ty:"good", d:{sl:"Umetnost.", en:"Art."}},
    {sig:"𐩵", n:"Al-Simak", div:"The Protecting", ang:"Ataliel", el:"Earth", ty:"neutral", d:{sl:"Čiščenje.", en:"Clearing."}},
    {sig:"𐩼", n:"Al-Ghafr", div:"The Strong", ang:"Iraziel", el:"Air", ty:"good", d:{sl:"Prijateljstvo.", en:"Friendship."}},
    {sig:"𐩹", n:"Al-Zubana", div:"The Subtle One", ang:"Ariel", el:"Air", ty:"bad", d:{sl:"Tehtanje.", en:"Decisions."}},
    {sig:"𐩮", n:"Al-Iklil", div:"The Provider", ang:"Tagriel", el:"Water", ty:"good", d:{sl:"Premagovanje.", en:"Overcoming."}},
    {sig:"𐩤", n:"Al-Kalb", div:"The Guardian", ang:"Alheniel", el:"Water", ty:"bad", d:{sl:"Denar.", en:"Money."}},
    {sig:"𐩣", n:"Al-Shaula", div:"The Enricher", ang:"Amnixiel", el:"Fire", ty:"bad", d:{sl:"Opustitev.", en:"Letting go."}},
    {sig:"𐩠", n:"Al-Na'am", div:"The Opener", ang:"Kyriel", el:"Fire", ty:"good", d:{sl:"Uspeh.", en:"Success."}},
    {sig:"𐩥", n:"Al-Baldah", div:"The King", ang:"Bethnael", el:"Earth", ty:"neutral", d:{sl:"Temelji.", en:"Foundations."}},
    {sig:"𐩷", n:"S. al-Dhabih", div:"The Capable", ang:"Geliel", el:"Earth", ty:"bad", d:{sl:"Sprememba.", en:"Change."}},
    {sig:"𐩺", n:"S. al-Bula", div:"The Forgiver", ang:"Requiel", el:"Air", ty:"neutral", d:{sl:"Zdravje.", en:"Health."}},
    {sig:"𐩰", n:"S. al-Su'ud", div:"The Grateful", ang:"Abrinael", el:"Air", ty:"good", d:{sl:"Sreča.", en:"Luck."}},
    {sig:"𐩯", n:"S. al-Akhbiya", div:"The Self-Sufficient", ang:"Aziel", el:"Air", ty:"bad", d:{sl:"Skrivnosti.", en:"Secrets."}},
    {sig:"𐩱", n:"A. al-Awwal", div:"The Powerful", ang:"Tagriel", el:"Water", ty:"good", d:{sl:"Mir.", en:"Peace."}},
    {sig:"𐩨", n:"A. al-Thani", div:"The Giver", ang:"Abriel", el:"Water", ty:"neutral", d:{sl:"Družina.", en:"Family."}},
    {sig:"𐩴", n:"Al-Risha", div:"The First", ang:"Amnixiel", el:"Water", ty:"good", d:{sl:"Konec.", en:"End."}}
];

const i18n = {
    sl: { zod: ["Oven","Bik","Dvojčka","Rak","Lev","Devica","Tehtnica","Škorpijon","Strelec","Kozorog","Vodnik","Ribi"], bod: ["Glava","Grlo","Pljuča","Prsi","Srce","Trebuh","Ledvica","Reprodukcija","Stegna","Kolenih","Gležnji","Stopala"], rul: ["Sonce","Luna","Mars","Merkur","Jupiter","Venera","Saturn"], ph: ["Mlaj","Rastoči srp","Prvi krajec","Rastoča luna","Ščip","Upadajoča luna","Zadnji krajec","Upadajoči srp"], elm: {"Fire":"Ogenj","Earth":"Zemlja","Air":"Zrak","Water":"Voda"}, adv: ["Bodi drzen.","Stabilnost.","Komuniciraj.","Dom.","Ustvarjaj.","Uredi.","Ravnovesje.","Globoko.","Raziskuj.","Cilji.","Unikaten.","Sanje."], ui: {sub:"Arabski lunini dvorci", up:"OSVEŽI", b:"Rojstni datum", d:"DAN", p:"TI", t:"SKUPAJ", h:"POMOČ", dn:"Prenos"}, help:"<b>MANAZIL:</b> Zelena-Dobro, Zlata-Nevtralno, Rdeča-Previdno.<br><button onclick='checkPremium()' style='width:100%;padding:10px;background:var(--gold);border:none;border-radius:10px;margin-top:10px'>AKTIVIRAJ PREMIUM</button>"},
    en: { zod: ["Aries","Taurus","Gemini","Cancer","Leo","Virgo","Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"], bod: ["Head","Throat","Lungs","Chest","Heart","Abdomen","Kidneys","Repro","Thighs","Knees","Ankles","Feet"], rul: ["Sun","Moon","Mars","Mercury","Jupiter","Venus","Saturn"], ph: ["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"], elm: {"Fire":"Fire","Earth":"Earth","Air":"Air","Water":"Water"}, adv: ["Bold.","Stability.","Communicate.","Home.","Creative.","Organize.","Balance.","Deep.","Explore.","Goals.","Unique.","Dreams."], ui: {sub:"Lunar Mansions", up:"UPDATE", b:"Birth", d:"DAY", p:"YOU", t:"TOTAL", h:"HELP", dn:"Download"}, help:"<b>GUIDE:</b> Green-Good, Gold-Neutral, Red-Caution."}
};

function checkPremium() { if(!isPremium) document.getElementById('premiumModal').style.display='flex'; }
function showActivationInput() { document.getElementById('donationView').style.display='none'; document.getElementById('activationView').style.display='block'; }
function showDonationView() { document.getElementById('donationView').style.display='block'; document.getElementById('activationView').style.display='none'; }

async function playW(){try{if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();if(aCtx.state==='suspended')await aCtx.resume();const o=aCtx.createOscillator(),g=aCtx.createGain();o.type='triangle';o.frequency.setValueAtTime(150,aCtx.currentTime);o.frequency.exponentialRampToValueAtTime(40,aCtx.currentTime+0.7);g.gain.setValueAtTime(0.15,aCtx.currentTime);g.gain.linearRampToValueAtTime(0,aCtx.currentTime+0.7);o.connect(g);g.connect(aCtx.destination);o.start();o.stop(aCtx.currentTime+0.7);}catch(e){}}
function getN(s){let n=s.toString().replace(/\D/g,'').split('').reduce((a,b)=>a+parseInt(b),0);while(n>9)n=n.toString().split('').reduce((a,b)=>a+parseInt(b),0);return n||1;}
function getMData(d){const jd=(d.getTime()/86400000)+2440587.5,t=(jd-2451545)/36525;let l=(218.316+481267.881*t)%360;l+=6.289*Math.sin((134.963+477198.867*t)*Math.PI/180);const age=((jd-2451550.1)%29.53059+29.53059)%29.53059,p=Math.floor((age/29.53059)*8)%8,i=["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];return{l:(l+360)%360,ph:p,icon:i[p]};}

function update(d){
    const p=document.getElementById('infoPanel'); p.style.opacity=0;
    setTimeout(()=>{
        const off=d.getTimezoneOffset()*60000; document.getElementById('dateInput').value=new Date(d-off).toISOString().slice(0,16);
        const da=getMData(d), mi=Math.floor(da.l/(360/28))%28, m=mansions[mi];
        document.getElementById('wheelBox').className='wheel-container glow-'+m.ty;
        if(m.ty==='bad')playW();
        document.getElementById('moonPointer').setAttribute('transform',`rotate(${da.l},150,150)`);
        document.getElementById('selected-date').innerText=d.toLocaleDateString(lang==='sl'?'sl-SI':'en-US',{weekday:'long',day:'numeric',month:'long'});
        document.getElementById('mPhase').innerText=`${da.icon} ${i18n[lang].ph[da.ph]}`;
        document.getElementById('mSigil').innerText=m.sig;
        document.getElementById('mName').innerText=(mi+1)+". "+m.n;
        document.getElementById('mDivine').innerText=m.div;
        document.getElementById('mDesc').innerText=m.d[lang];
        const zi=Math.floor(da.l/30);
        document.getElementById('zodAdvice').innerText=(lang==='sl'?`Luna v ${i18n[lang].zod[zi]}: ${i18n[lang].adv[zi]}`:`Moon in ${i18n[lang].zod[zi]}: ${i18n[lang].adv[zi]}`);
        document.getElementById('pill').innerText=m.ty.toUpperCase(); document.getElementById('pill').className='bg-'+m.ty;
        const ui=i18n[lang].ui;
        document.getElementById('eB').innerText=`${ui.bod}: ${i18n[lang].bod[zi]}`;
        document.getElementById('eR').innerText=`${ui.rul}: ${i18n[lang].rul[d.getDay()]}`;
        if(isPremium){
            document.getElementById('eA').innerText=`${ui.ang}: ${m.ang}`; document.getElementById('eE').innerText=`${ui.elm}: ${lang==='sl'?i18n.sl.elm[m.el]:m.el}`;
        }else{
            document.getElementById('eA').innerText=`${ui.ang}: 🔒 PREMIUM`; document.getElementById('eE').innerText=`${ui.elm}: 🔒 PREMIUM`;
        }
        const dN=getN(d.getDate().toString()+(d.getMonth()+1).toString()+d.getFullYear().toString());
        document.getElementById('dayNum').innerText=dN;
        const b=document.getElementById('birthInput').value;
        if(b){
            document.getElementById('pSec').style.display='block';
            if(isPremium){ const pN=getN(b.replace(/-/g,'')); document.getElementById('persNum').innerText=pN; }
            else { document.getElementById('persNum').innerText="🔒"; }
        }
        renderCal(d); p.style.opacity=1;
    },200);
}

function renderCal(sd){const c=document.getElementById('calendar');c.innerHTML='';for(let i=0;i<7;i++){let d=new Date(sd);d.setDate(sd.getDate()+i);const da=getMData(d),mi=Math.floor(da.l/(360/28))%28,m=mansions[mi];const it=document.createElement('div');it.className=`cal-item bg-${m.ty}`;it.innerHTML=`<div style="font-size:0.65rem;">${d.getDate()}.${d.getMonth()+1}.</div><div style="font-size:1.1rem;margin:2px 0;">${m.sig}</div><div style="font-size:0.55rem;font-weight:bold;">${m.n}</div>`;it.onclick=()=>update(new Date(d));c.appendChild(it);}}
function saveBirth(){localStorage.setItem('manazil_birth',document.getElementById('birthInput').value);hdlInp();}
function hdlInp(){update(new Date(document.getElementById('dateInput').value||new Date()));}
function toggleLang(){lang=lang==='sl'?'en':'sl';hdlInp();}
function tglH(){const b=document.getElementById('helpBox');b.style.display=b.style.display==='block'?'none':'block';b.innerHTML=i18n[lang].help;}
function processActivation(){const n=document.getElementById('userNameInput').value.trim();const k=document.getElementById('premiumKeyInput').value.trim();let h=0; n=n.toUpperCase();for(let i=0;i<n.length;i++)h+=n.charCodeAt(i);if((h*7).toString()===k && n!==""){localStorage.setItem('manazil_premium','true');location.reload();}else{alert("Napačen ključ.");}}
function dnApp(){const b=new Blob([document.documentElement.outerHTML],{type:'text/html'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Manazil.html';a.click();}
function draw(){const s=document.getElementById('mainWheel');let h='';for(let i=0;i<360;i+=2){const r=i%30===0?115:130;h+=`<line x1='${150+r*Math.cos((i-90)*Math.PI/180)}' y1='${150+r*Math.sin((i-90)*Math.PI/180)}' x2='${150+145*Math.cos((i-90)*Math.PI/180)}' y2='${150+145*Math.sin((i-90)*Math.PI/180)}' stroke='white' stroke-width='${i%30===0?2:1}' style='opacity:0.3'/>`;}for(let i=0;i<28;i++){const sA=i*(360/28)-90,eA=(i+1)*(360/28)-90;h+=`<path d='M ${150+85*Math.cos(sA*Math.PI/180)} ${150+85*Math.sin(sA*Math.PI/180)} A 85 85 0 0 1 ${150+85*Math.cos(eA*Math.PI/180)} ${150+85*Math.sin(eA*Math.PI/180)}' style='stroke:var(--${mansions[i].ty});fill:none;stroke-width:10;opacity:0.8'/>`;}h+=`<g id='moonPointer'><circle cx='150' cy='40' r='10' fill='white' filter='drop-shadow(0 0 8px white)'/></g>`;s.innerHTML=h;}

window.onload=()=>{
    draw(); const sav=localStorage.getItem('manazil_birth'); if(sav)document.getElementById('birthInput').value=sav; update(new Date());
    const sc=document.getElementById('stars'); for(let i=0;i<60;i++){const st=document.createElement('div');st.className='star';st.style.left=Math.random()*100+'%';st.style.top=Math.random()*100+'%';st.style.setProperty('--t',Math.random()*3+2+'s');sc.appendChild(st);}
};
</script>
</body>
</html>
