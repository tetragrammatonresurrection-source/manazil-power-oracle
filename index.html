function update(d){const p=document.getElementById('infoPanel');p.style.opacity=0;setTimeout(()=>{const off=d.getTimezoneOffset()*60000;document.getElementById('dateInput').value=new Date(d-off).toISOString().slice(0,16);const da=getMData(d),mi=Math.floor(da.l/(360/28))%28,m=mansions[mi];document.getElementById('wheelBox').className='wheel-container glow-'+m.ty;if(m.ty==='bad')playW();document.getElementById('moonPointer').setAttribute('transform',`rotate(${da.l},150,150)`);document.getElementById('selected-date').innerText=d.toLocaleDateString(lang==='sl'?'sl-SI':'en-US',{weekday:'long',day:'numeric',month:'long'});document.getElementById('mPhase').innerText=`${da.icon} ${i18n[lang].ph[da.ph]}`;document.getElementById('mSigil').innerText=m.sig;document.getElementById('mName').innerText=(mi+1)+". "+m.n;document.getElementById('mDivine').innerText=m.div;document.getElementById('mDesc').innerText=m.d[lang];const zi=Math.floor(da.l/30);document.getElementById('zodAdvice').innerText=(lang==='sl'?`Luna v ${i18n[lang].zod[zi]}: ${i18n[lang].adv[zi]}`:`Moon in ${i18n[lang].zod[zi]}: ${i18n[lang].adv[zi]}`);document.getElementById('pill').innerText=m.ty.toUpperCase();document.getElementById('pill').className='bg-'+m.ty;const ui=i18n[lang].ui;document.getElementById('eB').innerText=`${ui.bod}: ${i18n[lang].bod[zi]}`;document.getElementById('eR').innerText=`${ui.rul}: ${i18n[lang].rul[d.getDay()]}`;if(isPremium){document.getElementById('eA').innerText=`${ui.ang}: ${m.ang}`;document.getElementById('eE').innerText=`${ui.elm}: ${lang==='sl'?i18n.sl.elm[m.el]:m.el}`;document.getElementById('eA').classList.remove('locked-field');document.getElementById('eE').classList.remove('locked-field');}else{document.getElementById('eA').innerText=`${ui.ang}: 🔒 PREMIUM`;document.getElementById('eE').innerText=`${ui.elm}: 🔒 PREMIUM`;document.getElementById('eA').classList.add('locked-field');document.getElementById('eE').classList.add('locked-field');}const dN=getN(d.getDate().toString()+(d.getMonth()+1).toString()+d.getFullYear().toString());document.getElementById('dayNum').innerText=dN;const b=document.getElementById('birthInput').value;if(b){document.getElementById('pSec').style.display='block';document.getElementById('tSec').style.display='block';if(isPremium){const pN=getN(b.replace(/-/g,''));document.getElementById('persNum').innerText=pN;let tot=dN+pN;while(tot>9)tot=tot.toString().split('').reduce((x,y)=>x+parseInt(y),0);document.getElementById('totalNum').innerText=tot;document.getElementById('persNum').style.filter="none";document.getElementById('totalNum').style.filter="none";}else{document.getElementById('persNum').innerText="🔒";document.getElementById('totalNum').innerText="🔒";document.getElementById('persNum').style.filter="blur(3px)";document.getElementById('totalNum').style.filter="blur(3px)";}}renderCal(d);p.style.opacity=1;},200);}
function renderCal(sd){const c=document.getElementById('calendar');c.innerHTML='';for(let i=0;i<7;i++){let d=new Date(sd);d.setDate(sd.getDate()+i);const da=getMData(d),mi=Math.floor(da.l/(360/28))%28,m=mansions[mi];const it=document.createElement('div');it.className=`cal-item bg-${m.ty}`;it.innerHTML=`<div style="font-size:0.65rem;">${d.getDate()}.${d.getMonth()+1}.</div><div style="font-size:1.1rem;margin:2px 0;">${m.sig}</div><div style="font-size:0.55rem;font-weight:bold;">${m.n}</div>`;it.onclick=()=>update(new Date(d));c.appendChild(it);}}
function saveBirth(){localStorage.setItem('manazil_birth',document.getElementById('birthInput').value);hdlInp();}
function hdlInp(){update(new Date(document.getElementById('dateInput').value||new Date()));}
function toggleLang(){lang=lang==='sl'?'en':'sl';const ui=i18n[lang].ui;document.getElementById('langBtn').innerText=lang==='sl'?'ENG':'SLO';document.getElementById('subH').innerText=ui.sub;document.getElementById('updBtn').innerText=ui.up;document.getElementById('birthInput').placeholder=ui.b;document.getElementById('lblD').innerText=ui.d;document.getElementById('lblP').innerText=ui.p;document.getElementById('lblT').innerText=ui.t;document.getElementById('hBtn').innerText=ui.h;document.getElementById('dnBtn').innerText=ui.dn;const hb=document.getElementById('helpBox');if(hb.style.display==='block')hb.innerHTML=i18n[lang].help;draw();hdlInp();}
function tglH(){const b=document.getElementById('helpBox');b.style.display=b.style.display==='block'?'none':'block';b.innerHTML=i18n[lang].help;}
function checkPremium(){if(!isPremium)unlockPrompt();}
function dnApp(){const b=new Blob([document.documentElement.outerHTML],{type:'text/html'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Manazil.html';a.click();}
function draw(){const s=document.getElementById('mainWheel');let h='';for(let i=0;i<360;i+=2){const r=i%30===0?115:130;h+=`<line x1="${150+r*Math.cos((i-90)*Math.PI/180)}" y1="${150+r*Math.sin((i-90)*Math.PI/180)}" x2="${150+145*Math.cos((i-90)*Math.PI/180)}" y2="${150+145*Math.sin((i-90)*Math.PI/180)}" stroke="white" stroke-width="${i%30===0?2:1}" style="opacity:0.3"/>`;}i18n[lang].zod.forEach((z,i)=>{const a=i*30+15,x=150+95*Math.cos((a-90)*Math.PI/180),y=150+95*Math.sin((a-90)*Math.PI/180);h+=`<text x="${x}" y="${y}" class="zodiac-label" text-anchor="middle" transform="rotate(${a},${x},${y})">${z.substring(0,3).toUpperCase()}</text>`;});for(let i=0;i<28;i++){const sA=i*(360/28)-90,eA=(i+1)*(360/28)-90;h+=`<path d="M ${150+85*Math.cos(sA*Math.PI/180)} ${150+85*Math.sin(sA*Math.PI/180)} A 85 85 0 0 1 ${150+85*Math.cos(eA*Math.PI/180)} ${150+85*Math.sin(eA*Math.PI/180)}" style="stroke:var(--${mansions[i].ty});fill:none;stroke-width:10;opacity:0.8"/>`;}h+=`<g id="moonPointer"><circle cx="150" cy="40" r="10" fill="white" filter="drop-shadow(0 0 8px white)"/></g>`;s.innerHTML=h;}
window.onload=()=>{draw();const sav=localStorage.getItem('manazil_birth');if(sav)document.getElementById('birthInput').value=sav;update(new Date());const sc=document.getElementById('stars');for(let i=0;i<60;i++){const st=document.createElement('div');st.className='star';st.style.left=Math.random()*100+'%';st.style.top=Math.random()*100+'%';st.style.setProperty('--t',Math.random()*3+2+'s');sc.appendChild(st);}};
</script>
