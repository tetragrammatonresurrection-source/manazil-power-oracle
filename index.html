<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manazil Oracle | Premium</title>
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --card: rgba(10, 15, 25, 0.9); --good: #2ea043; --bad: #da3633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e6ed; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--t) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        .app-container { max-width: 450px; width: 100%; background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 30px; padding: 20px; box-shadow: 0 20px 50px #000; z-index: 1; text-align: center; }
        h1 { color: var(--gold); letter-spacing: 3px; font-weight: 300; margin: 0; }
        .wheel-container { position: relative; width: 220px; height: 220px; margin: 15px auto; border-radius: 50%; transition: 0.6s; }
        .glow-good { box-shadow: 0 0 30px var(--good); } .glow-bad { box-shadow: 0 0 30px var(--bad); } .glow-neutral { box-shadow: 0 0 30px var(--gold); }
        .info-panel { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.1); margin: 15px 0; }
        .num-circle { width: 40px; height: 40px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-weight: bold; }
        .big-btn { width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; background: var(--gold); color: #000; margin-top: 10px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 999; }
        .card { background: #0a0f1a; border: 1px solid var(--gold); padding: 25px; border-radius: 25px; max-width: 320px; width: 90%; color: white; }
        .qr-box { background: white; padding: 10px; border-radius: 15px; display: inline-block; margin: 15px 0; }
        .paypal-btn { background: #0070ba; color: white !important; text-decoration: none; padding: 12px; border-radius: 10px; display: block; font-weight: bold; margin: 10px 0; }
        .locked { filter: blur(4px); opacity: 0.5; cursor: pointer; }
    </style>
</head>
<body>
<div id="stars"></div>
<div class="app-container">
    <h1>Manazil Oracle</h1>
    <div id="date-display" style="color:var(--gold); font-size: 0.9rem; margin-top:5px;">---</div>
    <div style="margin: 10px 0;"><input type="date" id="bDay" onchange="saveB()" style="background:none; border:1px solid #333; color:white; padding:5px; border-radius:5px;"></div>
    <div id="wBox" class="wheel-container"><svg id="wheel" viewBox="0 0 300 300" style="width:100%"></svg></div>
    <div class="info-panel">
        <div id="mSig" style="font-size:3.5rem; color:var(--gold);"></div>
        <div id="mName" style="font-weight:bold; font-size:1.2rem;">---</div>
        <div style="display:flex; justify-content:space-around; margin:10px 0;">
            <div><div class="num-circle" id="dNum">-</div><small>DAN</small></div>
            <div id="pSec" style="display:none;"><div class="num-circle" id="pNum">-</div><small>TI</small></div>
        </div>
        <div id="mDesc" style="font-size:0.9rem; min-height:40px;">---</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:0.75rem; color:var(--gold);" onclick="openM()">
            <div id="eA">😇 ANGEL: 🔒</div><div id="eE">✨ ELEM: 🔒</div>
        </div>
    </div>
    <button class="big-btn" onclick="openM()">AKTIVIRAJ PREMIUM</button>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="card">
        <h2 style="color:var(--gold); margin:0;">PREMIUM</h2>
        <p style="font-size:0.8rem;">Vpiši ime za aktivacijo:</p>
        <input type="text" id="uName" placeholder="IME" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--gold); background:none; color:white; text-align:center;">
        <div class="qr-box">
            <img src="https://qrserver.com" width="140" height="140">
        </div>
        <p style="font-size:0.7rem; opacity:0.8;">Doniraj 5€+ in pripiši ime.<br>Ključ prejmeš na e-mail.</p>
        <a href="https://paypal.me" target="_blank" class="paypal-btn">PayPal.me/andraz82</a>
        <button class="big-btn" style="background:none; border:1px solid var(--gold); color:var(--gold)" onclick="doAct()">VNESI KLJUČ</button>
    </div>
</div>

<script>
let isPrem = localStorage.getItem('manazil_premium') === 'true';
const mansions = [
    {s:"𐩿", n:"Al-Sharatain", t:"good", a:"Geniel", e:"Ogenj", d:"Novi začetki."},
    {s:"𐩮", n:"Al-Butain", t:"neutral", a:"Enediel", e:"Zemlja", d:"Skrito bogastvo."},
    {s:"𐩤", n:"Al-Thurayya", t:"good", a:"Amixiel", e:"Ogenj", d:"Sreča v poslu."},
    {s:"𐩣", n:"Al-Debaran", t:"bad", a:"Azariel", e:"Zemlja", d:"Pazi na prepire."},
    {s:"𐩠", n:"Al-Haqa", t:"good", a:"Gabriel", e:"Zrak", d:"Modrost in učenje."},
    {s:"𐩥", n:"Al-Hana", t:"good", a:"Dirachiel", e:"Zrak", d:"Ljubezen in mir."},
    {s:"𐩷", n:"Al-Dhira", t:"good", a:"Seheliel", e:"Voda", d:"Zaščita doma."},
    {s:"𐩺", n:"Al-Nathra", t:"good", a:"Amnediel", e:"Voda", d:"Moč intuicije."},
    {s:"𐩰", n:"Al-Tarf", t:"bad", a:"Barbiel", e:"Ogenj", d:"Previdnost."},
    {s:"𐩯", n:"Al-Jabhah", t:"good", a:"Ardifiel", e:"Ogenj", d:"Ugled in čast."},
    {s:"𐩱", n:"Al-Zubrah", t:"good", a:"Zariel", e:"Ogenj", d:"Dobiček."},
    {s:"𐩨", n:"Al-Sarfah", t:"bad", a:"Alariel", e:"Zemlja", d:"Samota."},
    {s:"𐩴", n:"Al-Awwa", t:"good", a:"Hagiel", e:"Zemlja", d:"Umetnost."},
    {s:"𐩵", n:"Al-Simak", t:"neutral", a:"Ataliel", e:"Zemlja", d:"Čiščenje."},
    {s:"𐩼", n:"Al-Ghafr", t:"good", a:"Iraziel", e:"Zrak", d:"Prijateljstva."},
    {s:"𐩹", n:"Al-Zubana", t:"bad", a:"Ariel", e:"Zrak", d:"Odločitve."},
    {s:"𐩮", n:"Al-Iklil", t:"good", a:"Tagriel", e:"Voda", d:"Oviram ni poti."},
    {s:"𐩤", n:"Al-Kalb", t:"bad", a:"Alheniel", e:"Voda", d:"Previdnost."},
    {s:"𐩣", n:"Al-Shaula", t:"bad", a:"Amnixiel", e:"Ogenj", d:"Opustitev."},
    {s:"𐩠", n:"Al-Na'am", t:"good", a:"Kyriel", e:"Ogenj", d:"Uspeh."},
    {s:"𐩥", n:"Al-Baldah", t:"neutral", a:"Bethnael", e:"Zemlja", d:"Temelji."},
    {s:"𐩷", n:"S. al-Dhabih", t:"bad", a:"Geliel", e:"Zemlja", d:"Sprememba."},
    {s:"𐩺", n:"S. al-Bula", t:"neutral", a:"Requiel", e:"Zrak", d:"Zdravje."},
    {s:"𐩰", n:"S. al-Su'ud", t:"good", a:"Abrinael", e:"Zrak", d:"Velika sreča."},
    {s:"𐩯", n:"S. al-Akhbiya", t:"bad", a:"Aziel", e:"Zrak", d:"Skrivnosti."},
    {s:"𐩱", n:"A. al-Awwal", t:"good", a:"Tagriel", e:"Voda", d:"Mir."},
    {s:"𐩨", n:"A. al-Thani", t:"neutral", a:"Abriel", e:"Voda", d:"Družina."},
    {s:"𐩴", n:"Al-Risha", t:"good", a:"Amnixiel", e:"Voda", d:"Konec cikla."}
];

function openM() { if(!isPrem) document.getElementById('modal').style.display='flex'; }

function doAct() {
    const n = document.getElementById('uName').value.trim().toUpperCase();
    const k = prompt("Vnesi ključ:");
    let h=0; for(let i=0; i<n.length; i++) h+=n.charCodeAt(i);
    if(k === (h*7).toString() && n!="") { 
        localStorage.setItem('manazil_premium','true'); 
        alert("Odklenjeno!"); location.reload(); 
    } else alert("Napačen ključ.");
}

function update() {
    const d = new Date();
    const jd=(d.getTime()/86400000)+2440587.5, t=(jd-2451545)/36525;
    let l=(218.316+481267.881*t)%360; l+=6.289*Math.sin((134.963+477198.867*t)*Math.PI/180);
    const mi=Math.floor(((l+360)%360)/(360/28))%28, m=mansions[mi];
    
    document.getElementById('wBox').className='wheel-container glow-'+m.t;
    document.getElementById('mSig').innerText=m.s;
    document.getElementById('mName').innerText=(mi+1)+". "+m.n;
    document.getElementById('mDesc').innerText=m.d;
    document.getElementById('date-display').innerText=d.toLocaleDateString('sl-SI',{day:'numeric',month:'long'});
    
    // SVG krogla
    let h=''; for(let i=0;i<28;i++) {
        const sA=i*(360/28)-90, eA=(i+1)*(360/28)-90;
        h+=`<path d="M ${150+85*Math.cos(sA*Math.PI/180)} ${150+85*Math.sin(sA*Math.PI/180)} A 85 85 0 0 1 ${150+85*Math.cos(eA*Math.PI/180)} ${150+85*Math.sin(eA*Math.PI/180)}" fill="none" stroke="var(--${mansions[i].t})" stroke-width="12"/>`;
    }
    h+=`<circle cx="150" cy="150" r="140" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>`;
    h+=`<g transform="rotate(${(l+360)%360},150,150)"><circle cx="150" cy="40" r="8" fill="white" filter="drop-shadow(0 0 5px white)"/></g>`;
    document.getElementById('wheel').innerHTML=h;

    // Numerologija
    const n = (s) => { let r=s.toString().split('').reduce((a,b)=>a+parseInt(b),0); return r>9?n(r):r; };
    document.getElementById('dNum').innerText = n(d.getDate()+(d.getMonth()+1)+d.getFullYear());

    if(isPrem) {
        document.getElementById('eA').innerText="😇 ANGEL: "+m.a;
        document.getElementById('eE').innerText="✨ ELEM: "+m.e;
        const b=localStorage.getItem('m_birth');
        if(b){
            document.getElementById('pSec').style.display='block';
            document.getElementById('pNum').innerText=n(b.replace(/-/g,''));
        }
    }
}

function saveB() { localStorage.setItem('m_birth', document.getElementById('bDay').value); update(); }

window.onload=()=>{
    const sc=document.getElementById('stars');
    for(let i=0;i<50;i++) {
        const s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        s.style.setProperty('--t',Math.random()*3+2+'s'); sc.appendChild(s);
    }
    const sav=localStorage.getItem('m_birth');
    if(sav) document.getElementById('bDay').value=sav;
    update();
}
</script>
</body>
</html>
