<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manazil al-Qamar | Power Oracle</title>
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --card: rgba(10, 15, 25, 0.85); --good: #2ea043; --bad: #da3633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e6ed; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0f1a 0%, #05070a 100%); }
        .app-container { max-width: 500px; width: 100%; background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 35px; padding: 20px; box-shadow: 0 20px 50px #000; z-index: 1; }
        h1, .sub-header { text-align: center; color: var(--gold); text-transform: uppercase; margin: 0; }
        .wheel-container { position: relative; width: 240px; height: 240px; margin: 15px auto; border-radius: 50%; }
        .glow-good { box-shadow: 0 0 35px var(--good); } .glow-bad { box-shadow: 0 0 35px var(--bad); } .glow-neutral { box-shadow: 0 0 35px var(--gold); }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 15px; }
        input { flex: 2; background: transparent; border: none; color: white; outline: none; }
        .info-panel { text-align: center; padding: 15px; border-radius: 25px; background: rgba(0,0,0,0.5); border: 1px solid rgba(212, 175, 55, 0.15); margin-bottom: 15px; }
        .num-circle { width: 42px; height: 42px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 0 auto 5px; }
        .cal { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
        .cal-item { min-width: 90px; padding: 10px; border-radius: 15px; text-align: center; border: 2px solid transparent; color: white; cursor: pointer; }
        .big-btn { width: 100%; padding: 14px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; border: none; background: var(--gold); color: #000; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .premium-card { background: #0a0f1a; border: 1px solid var(--gold); padding: 30px; border-radius: 35px; text-align: center; max-width: 350px; }
        .qr-wrapper { background: white; padding: 10px; border-radius: 15px; margin: 15px 0; display: inline-block; }
        .paypal-btn { background: #0070ba; color: white; text-decoration: none; padding: 12px; border-radius: 12px; display: block; font-weight: bold; margin-top: 10px; }
        .locked-field { filter: blur(4px); opacity: 0.5; cursor: pointer; }
    </style>
</head>
<body>
<div id="stars"></div>
<div class="app-container">
    <h1>Manazil Oracle</h1>
    <div id="selected-date" style="text-align:center; color:var(--gold)">---</div>
    <div class="input-group"><input type="datetime-local" id="dateInput"><button class="big-btn" style="width:auto; margin:0" onclick="hdlInp()">OK</button></div>
    <div id="wheelBox" class="wheel-container"><svg id="mainWheel" viewBox="0 0 300 300" style="width:100%"></svg></div>
    <div class="info-panel">
        <div id="mSigil" style="font-size:3rem"></div>
        <div id="mName" style="font-weight:bold">---</div>
        <div style="display:flex; justify-content:space-around; margin:10px 0">
            <div><div class="num-circle" id="dayNum">-</div><small>DAN</small></div>
            <div id="pSec" style="display:none"><div class="num-circle" id="persNum">-</div><small>TI</small></div>
        </div>
        <div id="mDesc" style="font-size:0.9rem; margin:10px 0">---</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:0.8rem; color:var(--gold)" onclick="checkPremium()">
            <div id="eA">😇 ANGEL: -</div><div id="eE">✨ ELEM: -</div>
        </div>
    </div>
    <div class="cal" id="calendar"></div>
    <button class="big-btn" onclick="checkPremium()">AKTIVIRAJ PREMIUM</button>
</div>

<div id="premiumModal" class="modal-overlay" onclick="if(event.target==this)this.style.display='none'">
    <div class="premium-card">
        <h2 style="color:var(--gold)">PREMIUM ODKLEP</h2>
        <input type="text" id="userNameInput" placeholder="IME (npr. MATEJ)" style="width:100%; padding:12px; background:#000; border:1px solid var(--gold); color:white; text-align:center; border-radius:10px">
        <div class="qr-wrapper"><img src="https://qrserver.com" width="150" height="150" alt="PayPal QR"></div>
        <p style="font-size:0.8rem">Doniraj 5€+ in v sporočilo pripiši svoje IME.</p>
        <a href="https://paypal.me" target="_blank" class="paypal-btn">DONIRAJ PREK PAYPAL</a>
        <button class="big-btn" style="background:none; border:1px solid var(--gold); color:var(--gold)" onclick="processActivation()">VNESI KLJUČ</button>
    </div>
</div>

<script>
let isPremium = localStorage.getItem('manazil_premium') === 'true';
const mansions = [
    {sig:"𐩿", n:"Al-Sharatain", ty:"good", ang:"Geniel", el:"Fire", d:"Novi začetki."},
    {sig:"𐩮", n:"Al-Butain", ty:"neutral", ang:"Enediel", el:"Earth", d:"Skrito bogastvo."},
    {sig:"𐩤", n:"Al-Thurayya", ty:"good", ang:"Amixiel", el:"Fire", d:"Sreča v poslu."},
    {sig:"𐩣", n:"Al-Debaran", ty:"bad", ang:"Azariel", el:"Earth", d:"Pazi na prepire."},
    {sig:"𐩠", n:"Al-Haqa", ty:"good", ang:"Gabriel", el:"Air", d:"Modrost in učenje."},
    {sig:"𐩥", n:"Al-Hana", ty:"good", ang:"Dirachiel", el:"Air", d:"Ljubezen in mir."},
    {sig:"𐩷", n:"Al-Dhira", ty:"good", ang:"Seheliel", el:"Water", d:"Zaščita doma."},
    {sig:"𐩺", n:"Al-Nathra", ty:"good", ang:"Amnediel", el:"Water", d:"Moč intuicije."},
    {sig:"𐩰", n:"Al-Tarf", ty:"bad", ang:"Barbiel", el:"Fire", d:"Pazi na prevare."},
    {sig:"𐩯", n:"Al-Jabhah", ty:"good", ang:"Ardifiel", el:"Fire", d:"Ugled in čast."},
    {sig:"𐩱", n:"Al-Zubrah", ty:"good", ang:"Zariel", el:"Fire", d:"Dobiček s trudom."},
    {sig:"𐩨", n:"Al-Sarfah", ty:"bad", ang:"Alariel", el:"Earth", d:"Počitek in samota."},
    {sig:"𐩴", n:"Al-Awwa", ty:"good", ang:"Hagiel", el:"Earth", d:"Umetnost in lepota."},
    {sig:"𐩵", n:"Al-Simak", ty:"neutral", ang:"Ataliel", el:"Earth", d:"Čiščenje energije."},
    {sig:"𐩼", n:"Al-Ghafr", ty:"good", ang:"Iraziel", el:"Air", d:"Prijateljstva."},
    {sig:"𐩹", n:"Al-Zubana", ty:"bad", ang:"Ariel", el:"Air", d:"Tehtanje odločitev."},
    {sig:"𐩮", n:"Al-Iklil", ty:"good", ang:"Tagriel", el:"Water", d:"Premagovanje ovir."},
    {sig:"𐩤", n:"Al-Kalb", ty:"bad", ang:"Alheniel", el:"Water", d:"Denarna previdnost."},
    {sig:"𐩣", n:"Al-Shaula", ty:"bad", ang:"Amnixiel", el:"Fire", d:"Opustitev starega."},
    {sig:"𐩠", n:"Al-Na'am", ty:"good", ang:"Kyriel", el:"Fire", d:"Uspeh in darila."},
    {sig:"𐩥", n:"Al-Baldah", ty:"neutral", ang:"Bethnael", el:"Earth", d:"Temelji."},
    {sig:"𐩷", n:"S. al-Dhabih", ty:"bad", ang:"Geliel", el:"Earth", d:"Sprememba."},
    {sig:"𐩺", n:"S. al-Bula", ty:"neutral", ang:"Requiel", el:"Air", d:"Zdravje."},
    {sig:"𐩰", n:"S. al-Su'ud", ty:"good", ang:"Abrinael", el:"Air", d:"Velika sreča."},
    {sig:"𐩯", n:"S. al-Akhbiya", ty:"bad", ang:"Aziel", el:"Air", d:"Skrivnosti."},
    {sig:"𐩱", n:"A. al-Awwal", ty:"good", ang:"Tagriel", el:"Water", d:"Mir."},
    {sig:"𐩨", n:"A. al-Thani", ty:"neutral", ang:"Abriel", el:"Water", d:"Družina."},
    {sig:"𐩴", n:"Al-Risha", ty:"good", ang:"Amnixiel", el:"Water", d:"Konec cikla."}
];

function checkPremium() { if(!isPremium) document.getElementById('premiumModal').style.display='flex'; }
function generateKey(n) { let h=0; n=n.toUpperCase().trim(); for(let i=0; i<n.length; i++) h+=n.charCodeAt(i); return (h*7).toString(); }
function processActivation() {
    const n = document.getElementById('userNameInput').value;
    const k = prompt("Vnesi prejeti ključ:");
    if(k === generateKey(n) && n!="") { localStorage.setItem('manazil_premium','true'); alert("Odklenjeno!"); location.reload(); }
    else alert("Napačen ključ.");
}

function getMData(d) {
    const jd=(d.getTime()/86400000)+2440587.5, t=(jd-2451545)/36525;
    let l=(218.316+481267.881*t)%360; l+=6.289*Math.sin((134.963+477198.867*t)*Math.PI/180);
    return {l:(l+360)%360, ph:Math.floor(((jd-2451550.1)%29.53)/3.69)%8};
}

function update(d) {
    const da=getMData(d), mi=Math.floor(da.l/(360/28))%28, m=mansions[mi];
    document.getElementById('wheelBox').className='wheel-container glow-'+m.ty;
    document.getElementById('mSigil').innerText=m.sig;
    document.getElementById('mName').innerText=(mi+1)+". "+m.n;
    document.getElementById('mDesc').innerText=m.d;
    document.getElementById('selected-date').innerText=d.toLocaleDateString('sl-SI',{day:'numeric',month:'long'});
    
    if(isPremium) {
        document.getElementById('eA').innerText="😇 ANGEL: "+m.ang;
        document.getElementById('eE').innerText="✨ ELEM: "+m.el;
    } else {
        document.getElementById('eA').innerText="😇 ANGEL: 🔒";
        document.getElementById('eE').innerText="✨ ELEM: 🔒";
    }
    renderCal(d);
}

function renderCal(sd) {
    const c=document.getElementById('calendar'); c.innerHTML='';
    for(let i=0;i<7;i++){
        let d=new Date(sd); d.setDate(sd.getDate()+i);
        const da=getMData(d), mi=Math.floor(da.l/(360/28))%28, m=mansions[mi];
        const it=document.createElement('div'); it.className=`cal-item bg-${m.ty}`;
        it.innerHTML=`<small>${d.getDate()}.</small><br>${m.sig}`;
        it.onclick=()=>update(new Date(d));
        c.appendChild(it);
    }
}

function hdlInp() { update(new Date(document.getElementById('dateInput').value || new Date())); }
function saveBirth() { localStorage.setItem('m_birth', document.getElementById('birthInput').value); hdlInp(); }

window.onload=()=>{
    let h=''; for(let i=0;i<28;i++) {
        const sA=i*(360/28)-90, eA=(i+1)*(360/28)-90;
        h+=`<path d="M ${150+85*Math.cos(sA*Math.PI/180)} ${150+85*Math.sin(sA*Math.PI/180)} A 85 85 0 0 1 ${150+85*Math.cos(eA*Math.PI/180)} ${150+85*Math.sin(eA*Math.PI/180)}" fill="none" stroke="var(--${mansions[i].ty})" stroke-width="10"/>`;
    }
    h+=`<g id="moonPointer"><circle cx="150" cy="40" r="8" fill="white"/></g>`;
    document.getElementById('mainWheel').innerHTML=h;
    update(new Date());
    const sc=document.getElementById('stars');
    for(let i=0;i<50;i++) {
        const s=document.createElement('div'); s.className='star';
        s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
        sc.appendChild(s);
    }
}
</script>
</body>
</html>
